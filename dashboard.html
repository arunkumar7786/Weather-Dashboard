<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Dashboard</title>

</head>

<body>

    <h1>Login Successful 🎉</h1>

    <h2 id="welcome"></h2>

    <script>

        const user = localStorage.getItem("loggedInUser");

        document.getElementById("welcome").innerText =
            "Welcome, " + user;

    </script>

</body>

</html>
